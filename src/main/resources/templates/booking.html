<!DOCTYPE html>
<html>
<head>
<title>Book Flight</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<nav class="navbar navbar-dark bg-black">
<div class="container">
<a class="navbar-brand" href="/">Airline Reservation</a>
</div>
</nav>

<div class="container mt-5">

<h2>Book Flight Ticket</h2>

<form action="/booking/success" onsubmit="return validateBooking()">

<div class="mb-3">
<label>Passenger Name</label>
<input id="passengerName" class="form-control">
</div>

<div class="mb-3">
<label>Flight Number</label>
<input id="flightNumber" class="form-control">
</div>

<div class="mb-3">
<label>Seat Number</label>
<input id="seatNumber" class="form-control" onkeyup="previewSeat()">
</div>

<p id="seatPreview"></p>

<button class="btn btn-success">Confirm Booking</button>

</form>

</div>

</body>
</html>
