<!DOCTYPE html>
<html>
<head>
<title>Search Flights</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<nav class="navbar navbar-dark bg-black">
<div class="container">
<a class="navbar-brand" href="/">Airline Reservation</a>
</div>
</nav>

<div class="container mt-5">

<h2>Search Flights</h2>

<form action="/booking" method="get" onsubmit="return validateSearch()">

<div class="mb-3">
<label>From</label>
<input id="from" class="form-control" placeholder="City">
</div>

<div class="mb-3">
<label>To</label>
<input id="to" class="form-control" placeholder="City">
</div>

<div class="mb-3">
<label>Date</label>
<input id="date" type="date" class="form-control">
</div>

<button class="btn btn-primary">Search Flights</button>



</form>

</div>

</body>
</html>
